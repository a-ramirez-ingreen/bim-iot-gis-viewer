services:
  # Backend: FastAPI Web Service
  - type: web
    name: bim-gis-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DEFAULT_CRS
        value: EPSG:25830

  # Frontend: React Static Site
  - type: web
    name: bim-gis-frontend
    runtime: static
    staticPublishPath: ./frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
